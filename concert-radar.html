<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Concert Radar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 16px; max-width: 680px; margin: 0 auto; }
  header { padding: 24px 0 8px; }
  h1 { font-size: 1.6rem; color: #fff; }
  .meta { font-size: 0.8rem; color: #888; margin-top: 4px; }
  .toolbar { margin: 16px 0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .summary { font-size: 0.9rem; color: #aaa; flex: 1; min-width: 200px; line-height: 1.6; }
  .summary strong { color: #e0e0e0; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  select.city-pick { background: #1a1a2e; border: 1px solid #7c6af7; color: #e0e0e0; border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; }
  .city-search { background: #1a1a2e; border: 1px solid #444; color: #e0e0e0; border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; width: 130px; outline: none; }
  .city-search::placeholder { color: #555; }
  .city-search:focus { border-color: #7c6af7; }
  .city-search.loading { border-color: #f5c518; }
  .city-search.error { border-color: #e05; }
  .btn-ics { background: none; border: 1px solid #7c6af7; color: #7c6af7; border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer; }
  .btn-ics:hover { background: #7c6af7; color: #fff; }
  select.city-pick:hover { background: #7c6af7; color: #fff; }
  h2.month { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; color: #7c6af7; margin: 28px 0 12px; border-bottom: 1px solid #2a2a3e; padding-bottom: 6px; }
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 14px 16px; }
  .card-date { font-size: 0.72rem; color: #7c6af7; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .card-artist { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .stars { color: #f5c518; font-size: 0.8rem; margin-left: 4px; }
  .card-venue { font-size: 0.88rem; color: #ccc; margin-bottom: 2px; }
  .card-meta { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
  .card-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-btns a { font-size: 0.75rem; color: #7c6af7; text-decoration: none; border: 1px solid #7c6af7; border-radius: 20px; padding: 3px 10px; white-space: nowrap; }
  .card-btns a:hover { background: #7c6af7; color: #fff; }
  .empty { color: #555; text-align: center; padding: 48px 0; font-size: 0.9rem; }
  footer { margin-top: 32px; font-size: 0.72rem; color: #555; text-align: center; padding-bottom: 24px; }
</style>
</head>
<body>
<header>
  <h1>🎵 Concert Radar</h1>
  <div class="meta">Generated: 2026-06-20 05:41  ·  Window: 180 days  ·  Centre: Konstanz/Zurich</div>
</header>
<div class="toolbar">
  <div class="summary" id="summary">Loading…</div>
  <div class="controls">
    <select class="city-pick" id="cityPick" onchange="onPresetChange(+this.value)"></select>
    <input class="city-search" id="citySearch" type="text" placeholder="Any city…" title="Type a city and press Enter">
    <button class="btn-ics" onclick="exportICS()">📅 Export .ics</button>
  </div>
</div>
<div id="content"></div>
<footer>Source: Songkick · ★ 25 km · ★★ 50 km · ★★★ 100 km · ★★★★ 200 km · ★★★★★ 300 km · unrated 80 km</footer>
<script>
const ALL_EVENTS    = [];
const BANDS_TRACKED = 337;
const RADIUS        = {1:25, 2:50, 3:100, 4:200, 5:300};
const RADIUS_DEF    = 80;

const CITIES = [
  { name:"Konstanz / Zurich", lat:47.53, lon: 8.86 },
  { name:"Zurich",            lat:47.38, lon: 8.54 },
  { name:"Munich",            lat:48.14, lon:11.58 },
  { name:"Berlin",            lat:52.52, lon:13.40 },
  { name:"Hamburg",           lat:53.55, lon: 9.99 },
  { name:"Frankfurt",         lat:50.11, lon: 8.68 },
  { name:"Cologne",           lat:50.94, lon: 6.96 },
  { name:"Vienna",            lat:48.21, lon:16.37 },
  { name:"Amsterdam",         lat:52.37, lon: 4.90 },
  { name:"London",            lat:51.51, lon:-0.13 },
  { name:"Paris",             lat:48.85, lon: 2.35 },
  { name:"Barcelona",         lat:41.39, lon: 2.16 },
  { name:"Copenhagen",        lat:55.68, lon:12.57 },
  { name:"Stockholm",         lat:59.33, lon:18.07 },
];

// Populate dropdown
const pick = document.getElementById("cityPick");
CITIES.forEach((c, i) => {
  const o = document.createElement("option");
  o.value = i; o.textContent = c.name; pick.appendChild(o);
});

// City search input — geocode via Nominatim on Enter
const searchInput = document.getElementById("citySearch");
searchInput.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const q = searchInput.value.trim();
  if (!q) return;
  searchInput.classList.remove("error");
  searchInput.classList.add("loading");
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    if (!data.length) { searchInput.classList.replace("loading","error"); return; }
    const { lat, lon, display_name } = data[0];
    searchInput.classList.remove("loading");
    pick.value = "";   // deselect preset
    renderCity({ lat: +lat, lon: +lon, name: display_name.split(",")[0] });
  } catch(err) {
    searchInput.classList.replace("loading", "error");
  }
});

function onPresetChange(idx) {
  searchInput.value = "";
  searchInput.classList.remove("loading", "error");
  renderCity(CITIES[idx]);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, p = Math.PI / 180;
  const dp = (lat2-lat1)*p, dl = (lon2-lon1)*p;
  const a = Math.sin(dp/2)**2 + Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function starsHtml(r) {
  if (!r) return "";
  return `<span class="stars">${"★".repeat(r)+"☆".repeat(5-r)}</span>`;
}

function gcalUrl(ev, d8) {
  const q = s => encodeURIComponent(s);
  return "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    `&text=${q(ev.artist+" at "+ev.venue)}` +
    `&dates=${d8}T190000/${d8}T220000` +
    `&location=${q(ev.venue+", "+ev.city)}` +
    `&details=${q(ev.url||"")}`;
}

let currentFiltered = [];

function renderCity(city) {
  const now = new Date();

  const filtered = ALL_EVENTS
    .filter(ev => new Date(ev.date) >= now)
    .map(ev => ({ ...ev, km: Math.round(haversine(city.lat, city.lon, ev.lat, ev.lon)) }))
    .filter(ev => ev.km <= (ev.rating ? RADIUS[ev.rating] : RADIUS_DEF))
    .sort((a, b) => a.date.localeCompare(b.date));

  currentFiltered = filtered;
  const artistCount = new Set(filtered.map(e => e.artist)).size;

  document.getElementById("summary").innerHTML =
    `<strong>${BANDS_TRACKED}</strong> bands tracked · ` +
    `<strong>${artistCount}</strong> on tour · ` +
    `<strong>${filtered.length}</strong> show(s)`;

  if (!filtered.length) {
    document.getElementById("content").innerHTML =
      '<div class="empty">No upcoming shows found for this city.</div>';
    return;
  }

  let html = "", curMonth = "", inCards = false;
  for (const ev of filtered) {
    const dt      = new Date(ev.date);
    const month   = dt.toLocaleString("en-GB", { month:"long",  year:"numeric" });
    const dateStr = dt.toLocaleString("en-GB", { weekday:"short", day:"numeric", month:"short" });
    const d8      = ev.date.replace(/\D/g, "").substring(0, 8);

    if (month !== curMonth) {
      if (inCards) html += "</div>";
      html += `<h2 class="month">${month}</h2><div class="cards">`;
      curMonth = month; inCards = true;
    }

    const btns = [];
    if (ev.url)        btns.push(`<a href="${ev.url}" target="_blank">🎟 Songkick</a>`);
    if (ev.spotify_id) btns.push(`<a href="https://open.spotify.com/artist/${ev.spotify_id}" target="_blank">🎵 Spotify</a>`);
    btns.push(`<a href="${gcalUrl(ev, d8)}" target="_blank">📅 Google Cal</a>`);

    html += `
    <div class="card">
      <div class="card-date">${dateStr}</div>
      <div class="card-artist">${ev.artist} ${starsHtml(ev.rating)}</div>
      <div class="card-venue">${ev.venue}</div>
      <div class="card-meta">${ev.city}, ${ev.country} · ${ev.km} km</div>
      <div class="card-btns">${btns.join("")}</div>
    </div>`;
  }
  if (inCards) html += "</div>";
  document.getElementById("content").innerHTML = html;
}

function exportICS() {
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Concert Radar//EN\r\n";
  for (const ev of currentFiltered) {
    const d8 = ev.date.replace(/\D/g, "").substring(0, 8);
    ics += "BEGIN:VEVENT\r\n";
    ics += "SUMMARY:" + ev.artist + " at " + ev.venue + "\r\n";
    ics += "LOCATION:" + ev.venue + ", " + ev.city + "\r\n";
    ics += "DTSTART:" + d8 + "T190000\r\n";
    ics += "DTEND:"   + d8 + "T220000\r\n";
    if (ev.url) ics += "URL:" + ev.url + "\r\n";
    ics += "END:VEVENT\r\n";
  }
  ics += "END:VCALENDAR";
  const blob = new Blob([ics], { type: "text/calendar" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "concert-radar.ics";
  a.click();
}

renderCity(CITIES[0]);
</script>
</body>
</html>
