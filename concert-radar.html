const BANDS_TRACKED = 337;
const RADIUS        = {1:25, 2:50, 3:100, 4:200, 5:300};
const RADIUS_DEF    = 80;

const CITIES = [
  { name:"Konstanz / Zurich", lat:47.53, lon: 8.86 },
  { name:"Zurich",            lat:47.38, lon: 8.54 },
  { name:"Munich",            lat:48.14, lon:11.58 },
  { name:"Berlin",            lat:52.52, lon:13.40 },
  { name:"Hamburg",           lat:53.55, lon: 9.99 },
  { name:"Frankfurt",         lat:50.11, lon: 8.68 },
  { name:"Cologne",           lat:50.94, lon: 6.96 },
  { name:"Vienna",            lat:48.21, lon:16.37 },
  { name:"Amsterdam",         lat:52.37, lon: 4.90 },
  { name:"London",            lat:51.51, lon:-0.13 },
  { name:"Paris",             lat:48.85, lon: 2.35 },
  { name:"Barcelona",         lat:41.39, lon: 2.16 },
  { name:"Copenhagen",        lat:55.68, lon:12.57 },
  { name:"Stockholm",         lat:59.33, lon:18.07 },
];

// Populate dropdown
const pick = document.getElementById("cityPick");
CITIES.forEach((c, i) => {
  const o = document.createElement("option");
  o.value = i; o.textContent = c.name; pick.appendChild(o);
});

// City search input — geocode via Nominatim on Enter
const searchInput = document.getElementById("citySearch");
searchInput.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const q = searchInput.value.trim();
  if (!q) return;
  searchInput.classList.remove("error");
  searchInput.classList.add("loading");
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    if (!data.length) { searchInput.classList.replace("loading","error"); return; }
    const { lat, lon, display_name } = data[0];
    searchInput.classList.remove("loading");
    pick.value = "";   // deselect preset
    renderCity({ lat: +lat, lon: +lon, name: display_name.split(",")[0] });
  } catch(err) {
    searchInput.classList.replace("loading", "error");
  }
});

function onPresetChange(idx) {
  searchInput.value = "";
  searchInput.classList.remove("loading", "error");
  renderCity(CITIES[idx]);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, p = Math.PI / 180;
  const dp = (lat2-lat1)*p, dl = (lon2-lon1)*p;
  const a = Math.sin(dp/2)**2 + Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function starsHtml(r) {
  if (!r) return "";
  return `<span class="stars">${"★".repeat(r)+"☆".repeat(5-r)}</span>`;
}

function gcalUrl(ev, d8) {
  const q = s => encodeURIComponent(s);
  return "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    `&text=${q(ev.artist+" at "+ev.venue)}` +
    `&dates=${d8}T190000/${d8}T220000` +
    `&location=${q(ev.venue+", "+ev.city)}` +
    `&details=${q(ev.url||"")}`;
}

let currentFiltered = [];

function renderCity(city) {
  const now = new Date();

  const filtered = ALL_EVENTS
    .filter(ev => new Date(ev.date) >= now)
    .map(ev => ({ ...ev, km: Math.round(haversine(city.lat, city.lon, ev.lat, ev.lon)) }))
    .filter(ev => ev.km <= (ev.rating ? RADIUS[ev.rating] : RADIUS_DEF))
    .sort((a, b) => a.date.localeCompare(b.date));

  currentFiltered = filtered;
  const artistCount = new Set(filtered.map(e => e.artist)).size;

  document.getElementById("summary").innerHTML =
    `<strong>${BANDS_TRACKED}</strong> bands tracked · ` +
    `<strong>${artistCount}</strong> on tour · ` +
    `<strong>${filtered.length}</strong> show(s)`;

  if (!filtered.length) {
    document.getElementById("content").innerHTML =
      '<div class="empty">No upcoming shows found for this city.</div>';
    return;
  }

  let html = "", curMonth = "", inCards = false;
  for (const ev of filtered) {
    const dt      = new Date(ev.date);
    const month   = dt.toLocaleString("en-GB", { month:"long",  year:"numeric" });
    const dateStr = dt.toLocaleString("en-GB", { weekday:"short", day:"numeric", month:"short" });
    const d8      = ev.date.replace(/\D/g, "").substring(0, 8);

    if (month !== curMonth) {
      if (inCards) html += "</div>";
      html += `<h2 class="month">${month}</h2><div class="cards">`;
      curMonth = month; inCards = true;
    }

    const btns = [];
    if (ev.url)        btns.push(`<a href="${ev.url}" target="_blank">🎟 Songkick</a>`);
    if (ev.spotify_id) btns.push(`<a href="https://open.spotify.com/artist/${ev.spotify_id}" target="_blank">🎵 Spotify</a>`);
    btns.push(`<a href="${gcalUrl(ev, d8)}" target="_blank">📅 Google Cal</a>`);

    const isKula  = (ev.venue || "").includes("Kulturladen");
    const trackBadge = ev.tracked ? `<span class="badge badge-track">tracked</span>` : "";
    const kulaBadge  = isKula     ? `<span class="badge badge-kula">★ Kula</span>` : "";

    html += `
    <div class="card">
      <div class="card-date">${dateStr}</div>
      <div class="card-artist">${ev.artist} ${starsHtml(ev.rating)}${trackBadge}${kulaBadge}</div>
      <div class="card-venue">${ev.venue}</div>
      <div class="card-meta">${ev.city}, ${ev.country} · ${ev.km} km</div>
      <div class="card-btns">${btns.join("")}</div>
    </div>`;
  }
  if (inCards) html += "</div>";
  document.getElementById("content").innerHTML = html;
}

function exportICS() {
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Concert Radar//EN\r\n";
  for (const ev of currentFiltered) {
    const d8 = ev.date.replace(/\D/g, "").substring(0, 8);
    ics += "BEGIN:VEVENT\r\n";
    ics += "SUMMARY:" + ev.artist + " at " + ev.venue + "\r\n";
    ics += "LOCATION:" + ev.venue + ", " + ev.city + "\r\n";
    ics += "DTSTART:" + d8 + "T190000\r\n";
    ics += "DTEND:"   + d8 + "T220000\r\n";
    if (ev.url) ics += "URL:" + ev.url + "\r\n";
    ics += "END:VEVENT\r\n";
  }
  ics += "END:VCALENDAR";
  const blob = new Blob([ics], { type: "text/calendar" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "concert-radar.ics";
  a.click();
}

renderCity(CITIES[0]);
</script>
